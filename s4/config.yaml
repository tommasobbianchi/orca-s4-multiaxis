# S4_Slicer default parameters
# These match Joshua Bird's notebook defaults.

# --- Stage A: mesh deformation ---
deform:
  MAX_OVERHANG: 30                # maximum overhang angle in degrees
  ROTATION_MULTIPLIER: 2          # larger = more aggressive rotation
  NEIGHBOUR_LOSS_WEIGHT: 20       # larger = smoother rotation field
  MAX_POS_ROTATION: 3600          # degrees, clipped internally
  MAX_NEG_ROTATION: -3600
  STEEP_OVERHANG_COMPENSATION: true
  SET_INITIAL_ROTATION_TO_ZERO: false
  INITIAL_ROTATION_FIELD_SMOOTHING: 30
  rotation_iterations: 100        # least_squares max_nfev for rotation opt
  deformation_iterations: 1000    # least_squares max_nfev for deformation opt
  part_offset: [0, 0, 0]
  save_gif: false

# --- Stage C: gcode inverse-transform ---
transform:
  SEG_SIZE: 0.6                   # mm, re-segment moves to this length
  MAX_ROTATION: 30                # degrees, max tilt in gcode output
  MIN_ROTATION: -130              # degrees, min tilt in gcode output
  NOZZLE_OFFSET: 42               # mm, nozzle tip-to-pivot distance
  ROTATION_AVERAGING_ALPHA: 0.2   # EMA smoothing on rotation
  ROTATION_MAX_DELTA: 1           # degrees, insert intermediate points if tilt delta > this
  RETRACTION_LENGTH: 1.0          # mm
  MAX_EXTRUSION_MULTIPLIER: 10
  kinematics: "rtheta"            # "rtheta" (RRF, G93) | "klipper" (mm/min F) | "cartesian_b"
  # Klipper feed weights (only used when kinematics: "klipper"); 1.0 = preserve planar time
  # FEED_WEIGHT_C: 1.0
  # FEED_WEIGHT_B: 1.0
  # TRAVEL_FEED: 20000.0

# --- Stage B: external slicer ---
# Native OrcaSlicer 2.4.0-dev binary (no AppImage/FUSE); full profile tree lives
# under orca-pr12998/resources/profiles. Verified headless-slicing 2026-07-06.
orca_binary: "/home/tommaso/projects/orca-pr12998/build/src/orca-slicer"
# machine + process, ";"-joined -> --load-settings.
# Machine = in-repo Klipper profile (s4/profiles/S4_klipper_centered.json): a
# CENTER-ORIGIN 250mm bed inheriting the stock "Generic Klipper Printer", so the
# origin-centered part slices as-placed and no gcode reframe is needed. Klipper
# profiles pass Orca's headless --load-settings compat check (stock Marlin/Voron
# pairs return exit -17 "not compatible"; Klipper and Bambu do not).
orca_config: "/home/tommaso/projects/Orca-s4/S4_Slicer/s4/profiles/S4_klipper_centered.json;/home/tommaso/projects/orca-pr12998/resources/profiles/Custom/process/0.20mm Standard @MyKlipper.json"
# filament -> --load-filaments (separate flag, NOT part of orca_config)
orca_filament: "/home/tommaso/projects/orca-pr12998/resources/profiles/OrcaFilamentLibrary/filament/Generic PLA @System.json"
# Center-origin bed above -> part already at the rotary axis, no reframe. Set to
# [x, y] mm only for a corner-origin bed (then the mesh is translated onto the
# bed to slice and the planar gcode is shifted back to origin for Stage C).
bed_center: null
